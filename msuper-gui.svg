<svg width="128" height="128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5aa0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded rectangle -->
  <rect x="8" y="8" width="112" height="112" rx="20" ry="20"
        fill="url(#bgGradient)" filter="url(#dropShadow)"/>

  <!-- Border -->
  <rect x="8" y="8" width="112" height="112" rx="20" ry="20"
        fill="none" stroke="#1a3a6a" stroke-width="2"/>

  <!-- MS Text -->
  <text x="64" y="82" font-family="Arial, sans-serif" font-size="56"
        font-weight="bold" text-anchor="middle"
        fill="url(#textGradient)" stroke="#1a3a6a" stroke-width="1">MS</text>
</svg>
